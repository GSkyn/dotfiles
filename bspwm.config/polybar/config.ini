[colors]
; Rosé Pine Moon Palette
background     = #232136
background-alt = #2a273f
surface        = #393552
foreground     = #e0def4
love           = #eb6f92
gold           = #f6c177
mint           = #a3be8c
rose           = #ea9a97
pine           = #3e8fb0
foam           = #9ccfd8
iris           = #c4a7e7
highlight      = #44415a
transparent    = #00000000

; =======================================
;                BAR SETUP
; =======================================

[bar/main]
width = 100% 
height = 20pt
radius = 0
bottom = true
offset-x = 0%
wm-restack = bspwm

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt
border-size = 2pt
border-color = ${colors.surface}

padding-left = 0
padding-right = 0

; CRITICAL: Margins and separators must be zero for Powerline arrows to connect seamlessly
module-margin = 0
separator = 

; Fonts
font-0 = "JetBrainsMono Nerd Font:size=10;2"
font-1 = "FontAwesome:size=10;2"
font-2 = "Noto Sans Thai Looped:size=10;2"
font-3 = "Google Sans:size=10,2"

; Module Layout
modules-left = bspwm xwindow 
modules-center =
modules-right = tray space weather filesystem cpu memory xkeyboard pulseaudio date

cursor-click = pointer
cursor-scroll = ns-resize
wenable-ipc = true

; =======================================
;                MODULES
; =======================================
[module/tray]
type = internal/tray
format-margin = 1
tray-spacing = 8px
tray-size = 80%
format-background = ${colors.background}

[module/bspwm]
type = internal/bspwm
pin-workspaces = true
inline-mode = false
enable-click = true
enable-scroll = true
format = <label-state>

label-focused = %name%
label-focused-foreground = ${colors.background}
label-focused-background = ${colors.rose}
label-focused-padding = 1

label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-background = ${colors.surface}
label-occupied-underline = ${colors.rose}
label-occupied-padding = 1

label-urgent = %name%
label-urgent-foreground = ${colors.rose}
label-urgent-background = ${colors.surface}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-background = ${colors.surface}
label-empty-padding = 1


[module/xwindow]
type = internal/xwindow
label = %title:0:40:...%
label-foreground = ${colors.foreground}
format-padding = 1

[module/media]
type = custom/script
exec = ~/.config/polybar/media.sh
interval = 1
format = <label>
format-background = ${colors.background-alt}
format-foreground = ${colors.foreground}
format-padding = 1
label = %output:0:45:...%
click-left = playerctl play-pause
click-right = ~/.config/polybar/media-focus.sh

[module/weather]
type = custom/script
exec = curl -s --max-time 2 'wttr.in/Yala?format=%C+%t' || echo "Offline"
interval = 600
format = <label>
format-background = ${colors.surface}
format-foreground = ${colors.foreground}
format-padding = 1
click-left = kitty -e sh -c 'curl -s wttr.in/Yala | less -R'

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
format-mounted-prefix = "Disk "
format-mounted-prefix-foreground = ${colors.foam}
format-mounted-background = ${colors.background-alt}
format-mounted-foreground = ${colors.foreground}
format-mounted-padding = 1
label-mounted = %{A1:nemo &:}%percentage_used%%%{A}
label-unmounted = %mountpoint% not mounted

[module/nvidia]
type = custom/script
exec = nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader,nounits | awk '{print $1"%"}'
interval = 2
format-prefix = "GPU "
format-prefix-foreground = ${colors.love}
format-background = ${colors.highlight}
format-foreground = ${colors.foreground}
format-padding = 1
label = %output%
click-left = kitty -e watch -n 1 nvidia-smi

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.background}
format-background = ${colors.foam}
format-foreground = ${colors.background}
format-padding = 1
label = %{A1:kitty -e htop:}%percentage:2%%%{A}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.background}
format-background = ${colors.pine}
format-foreground = ${colors.background}
format-padding = 1
label = %{A1:kitty -e htop:}%percentage_used:2%%%{A}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
blacklist-1 = scroll lock
format = <label-layout><label-indicator> 
format-prefix = ""
format-prefix-foreground = ${colors.background}
format-background = ${colors.love}
format-foreground = ${colors.background}
format-padding = 0

label-layout = %layout%
label-layout-padding = 1

; --- Caps Lock ON ---
label-indicator-on-capslock = "Caps On"
label-indicator-on-capslock-foreground = ${colors.background}
label-indicator-on-capslock-background = ${colors.rose}
label-indicator-on-capslock-padding = 1

; --- Caps Lock OFF ---
label-indicator-off-capslock = "Caps Off"
label-indicator-off-capslock-foreground = ${colors.background}
label-indicator-off-capslock-background = ${colors.rose}
label-indicator-off-capslock-padding = 1

[module/pulseaudio]
type = internal/pulseaudio

format-volume            = <ramp-volume> <label-volume>
format-volume-background = ${colors.mint}
format-volume-foreground = ${colors.background}
format-volume-padding    = 1
label-volume             = %percentage%

ramp-volume-0            = 󰕿
ramp-volume-1            = 󰖀
ramp-volume-2            = 󰕾

label-muted              = 󰖁 
format-muted-background  = ${colors.love}
format-muted-foreground  = ${colors.background}
format-muted-padding     = 1

click-right              = pavucontrol &

[module/date]
type = internal/date
interval = 1
date = %D %H:%M
date-alt = %d-%m-%Y %H:%M:%S
format-background = ${colors.gold}
format-foreground = ${colors.background}
format-padding = 1

; =======================================
;                SETTINGS
; =======================================

[settings]
screenchange-reload = true
pseudo-transparency = false
