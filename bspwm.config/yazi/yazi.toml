[opener]
edit = [
    { run = 'nvim "$@"', block = true, desc = "Neovim" },
]
play = [
    { run = 'haruna "$@"', orphan = true, desc = "Haruna" },
]
view = [
    { run = 'gwenview "$@"', orphan = true, desc = "Gwenview" },
]
read = [
    { run = 'okular "$@"', orphan = true, desc = "Okular" },
]

[open]
rules = [
    # Text files and code
    { mime = "text/*", use = "edit" },
    { mime = "application/json", use = "edit" },
    
    # Media
    { mime = "video/*", use = "play" },
    { mime = "audio/*", use = "play" },
    { mime = "image/*", use = "view" },
    
    # Documents
    { mime = "application/pdf", use = "read" },
    { mime = "application/epub+zip", use = "read" },
]

# Add this to your keymap.toml
[[mgr.prepend_keymap]]
on = "y"
run = [ "shell -- echo %s | xclip -i -selection clipboard -t text/uri-list", "yank" ]

