[colors]
; Tokyo Night (Storm) Palette
background     = #24283b
background-alt = #2f3549
;foreground     = #c0caf5
foreground     = #565f89
disabled       = #565f89

; Accents
red            = #f7768e
green          = #9ece6a
yellow         = #e0af68
blue           = #7aa2f7
purple         = #bb9af7
aqua           = #7dcfff
orange         = #ff9e64

; =======================================
;                BAR SETUP
; =======================================

[bar/main]
width = 100%
height = 18pt
radius = 0
bottom = true
wm-restack = bspwm

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt
border-size = 2pt
border-color = ${colors.background-alt}

padding-left = 1
padding-right = 1

module-margin = 1

; Clean separator
separator = 
separator-foreground = ${colors.disabled}

; Fonts
font-0 = "IosevkaTerm Nerd Font:size=12;2"
font-1 = "Google Sans:size=12;2"

modules-left = bspwm xwindow
modules-center = 
modules-right = tray xkeyboard cpu memory pulseaudio date

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

; =======================================
;                MODULES
; =======================================

[module/tray]
type = internal/tray
format-margin = 4px
tray-spacing = 8px
tray-size = 60%

[module/bspwm]
type = internal/bspwm
pin-workspaces = true
enable-click = true
enable-scroll = true

label-focused = %name%
label-focused-foreground = ${colors.blue}
label-focused-padding = 1
label-focused-background = ${colors.background-alt}
label-focused-overline = ${colors.background}
label-focused-underline = ${colors.background}

label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1

label-urgent = %name%
label-urgent-foreground = ${colors.red}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:50:...%
label-foreground = ${colors.disabled}
label-empty =  
label-padding = 1

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.foreground}
label = %percentage:2%%
format-underline = ${colors.orange}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.foreground}
label = %percentage_used:2%%
format-underline = ${colors.aqua}

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
format-volume-underline = ${colors.green}

ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀
ramp-volume-2 = 󰕾
ramp-volume-foreground = ${colors.green}

label-volume = %percentage%%
label-muted = 󰖁 Muted
label-muted-foreground = ${colors.red}
label-muted-underline = ${colors.red}

click-right = pavucontrol &

[module/xkeyboard]
type = internal/xkeyboard

; Ignore num lock and scroll lock
blacklist-0 = num lock
blacklist-1 = scroll lock

format = <label-layout><label-indicator>

label-layout = %layout%
label-layout-padding = 1
label-layout-foreground = ${colors.foreground}
label-layout-underline = ${colors.red}

; --- Caps Lock Indicator ---
label-indicator-on-capslock = "Ca"
label-indicator-on-capslock-foreground = ${colors.red}

[module/date]
type = internal/date
interval = 1
date = %d-%m-%Y %H:%M
format-prefix = ""
format-prefix-foreground = ${colors.blue}
label = %date%
label-foreground = ${colors.foreground}

; =======================================
;                SETTINGS
; =======================================

[settings]
screenchange-reload = true
pseudo-transparency = false
